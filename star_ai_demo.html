<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STAR.AI · 对话界面</title>
<style>
:root{--bg:#0a0d13;--card:#1a1e2b;--card2:#242c40;--text:#eaeaff;--muted:#8892b3;--accent:#7c5cff;--accent2:#35d0ff;--line:rgba(255,255,255,.08)}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#0a0d13,#0b1020);color:var(--text)}
.wrap{max-width:960px;margin:0 auto;padding:30px 20px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:20px}
.brand{font-size:26px;font-weight:800}.brand span{color:var(--accent2)}
.nav a{margin-right:12px;color:var(--muted);text-decoration:none}
.card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:20px;padding:24px;margin-bottom:24px;box-shadow:0 18px 44px rgba(0,0,0,.28)}
textarea{width:100%;min-height:120px;padding:12px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.04);color:var(--text);font-family:inherit;resize:vertical}
button{padding:12px 20px;margin-top:12px;border:none;border-radius:12px;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;cursor:pointer;font-weight:600}
button:disabled{background:#555;cursor:not-allowed}
.response{margin-top:18px;padding:16px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;white-space:pre-wrap;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">星浪<span>音乐</span> · STAR.AI</div>
    <div class="nav"><a href="index.php">首页</a></div>
  </div>

  <section class="card">
    <h2>和 STAR.AI 聊天</h2>
    <textarea id="prompt" placeholder="在这里输入你的请求或对话…"></textarea>
    <button id="sendBtn">发送给 STAR.AI</button>
    <div id="status" class="response" style="display:none;"></div>
    <div id="answer" class="response" style="display:none;"></div>
  </section>
</div>
<script>
const sendBtn = document.getElementById('sendBtn');
const promptEl = document.getElementById('prompt');
const statusEl = document.getElementById('status');
const answerEl = document.getElementById('answer');

function setStatus(msg){statusEl.textContent = msg; statusEl.style.display='block'; answerEl.style.display='none';}
function setAnswer(msg){answerEl.textContent = msg; answerEl.style.display='block'; statusEl.style.display='none';}

sendBtn.addEventListener('click', async () => {
  const prompt = promptEl.value.trim();
  if(!prompt){ setStatus('请先输入内容'); return; }
  setStatus('发送中…');
  sendBtn.disabled = true;
  try{
    const resp = await fetch('star-ai.php', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({prompt})
    });
    const data = await resp.json();
    if(data.error){ setStatus('错误：'+data.error); }
    else if(data.result){ setAnswer(data.result); }
    else { setStatus('未知响应格式'); }
  }catch(e){ setStatus('请求失败：'+e.message); }
  sendBtn.disabled = false;
});
</script>
<script src="/js/xingzai-widget.js" data-api="/backend/xingzai_chat.php" data-avatar="/images/xingzai-avatar.jpg"></script>
</body>
</html>
