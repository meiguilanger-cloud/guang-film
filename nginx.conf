# nginx configuration for new_music_project
# Place this file in /etc/nginx/sites-available/ and symlink to sites-enabled

server {
    listen 80;
    server_name _; # replace with your domain

    root /var/www/html/new_music_project;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock; # adjust if needed
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
