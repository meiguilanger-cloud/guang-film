# Starwaves production Nginx template
#
# Suggested domain split:
# - www.starwaves.com.cn    main site, backend pages, login/register
# - media.starwaves.com.cn  song proxy, mix/master proxy, downloads, lyrics
# - static.starwaves.com.cn CDN/static assets (optional but recommended)
#
# Replace domain names, root path, and PHP-FPM socket before use.

upstream starwaves_php {
    server unix:/run/php/php8.2-fpm.sock;
}

server {
    listen 80;
    server_name www.starwaves.com.cn starwaves.com.cn;

    root /var/www/starwaves;
    index index.php index.html;

    client_max_body_size 120M;

    # Public pages and backend pages live on the main site.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Allow direct access to common static paths while the project still serves
    # assets from the main app root.
    location ~* ^/(css|js|images|fonts)/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Runtime-generated public files should be short-cached, not immutable.
    location ^~ /backend/generated-covers/ {
        expires 10m;
        add_header Cache-Control "public, max-age=600";
        try_files $uri =404;
    }

    location ^~ /backend/lyrics/ {
        expires 10m;
        add_header Cache-Control "public, max-age=600";
        try_files $uri =404;
    }

    # Never expose writable/private runtime directories directly.
    location ^~ /backend/uploads/ {
        deny all;
    }

    location ^~ /storage/ {
        deny all;
    }

    location ^~ /logs/ {
        deny all;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass starwaves_php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 600;
    }
}

server {
    listen 80;
    server_name media.starwaves.com.cn;

    root /var/www/starwaves;
    index index.php;

    client_max_body_size 120M;

    # Audio proxy endpoints. Keep this host focused on streaming and downloads.
    location = /backend/netdisk_stream.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass starwaves_php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 600;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location = /backend/netdisk_mix_stream.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass starwaves_php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 600;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location = /backend/download.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass starwaves_php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 600;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # Optional direct public lyric/covers access if front-end points at media.
    location ^~ /backend/lyrics/ {
        expires 10m;
        add_header Cache-Control "public, max-age=600";
        try_files $uri =404;
    }

    location ^~ /backend/generated-covers/ {
        expires 10m;
        add_header Cache-Control "public, max-age=600";
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}

server {
    listen 80;
    server_name static.starwaves.com.cn;

    root /var/www/starwaves;

    # CDN/static host. Restrict to static directories only.
    location ~* ^/(css|js|images|fonts)/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location = /favicon.ico {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        return 404;
    }
}
