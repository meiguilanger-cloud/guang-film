<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>母带处理 - Starwaves Music</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
  <nav class="bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center space-x-4">
        <a href="index.html" class="text-xl font-bold text-indigo-600">Starwaves Music</a>
        <a href="star-ai.html" class="text-gray-700 hover:text-indigo-600">STAR.AI</a>
        
        <a href="master.html" class="text-indigo-600 font-semibold">母带</a>
        <a href="top.html" class="text-gray-700 hover:text-indigo-600">STAR TOP榜</a>
      </div>
      <div id="user-section" class="flex items-center space-x-2"></div>
    </div>
  </nav>

  <section class="max-w-4xl mx-auto py-12">
    <h1 class="text-3xl font-bold mb-6">母带处理</h1>
    <p class="mb-4">上传混音完成的音频文件，系统将进行专业母带处理（后续接入实际母带服务）。</p>
    <form class="bg-white p-6 rounded shadow space-y-4">
      <label class="block">
        <span class="text-gray-700">上传混音文件（WAV/MP3）</span>
        <input type="file" accept=".wav,.mp3" class="mt-1 block w-full" required />
      </label>
      <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-500">开始母带</button>
    </form>
    <div class="mt-6 text-sm text-gray-600">（功能待实现）</div>
  </section>

  <footer class="bg-gray-800 text-gray-200 py-4 mt-12">
    <div class="max-w-7xl mx-auto text-center">© 2026 Starwaves Music</div>
  </footer>

  <script>
    async function renderUserSection(){
      const userSection=document.getElementById('user-section');
      try {
        const resp=await fetch('/backend/status.php', {credentials:'include'});
        const data=await resp.json();
        if(data.logged_in){
          userSection.innerHTML=`<span class='mr-2'>欢迎, ${data.username}</span><a href='/backend/logout.php' class='px-2 py-1 bg-gray-600 rounded hover:bg-gray-5'>退出</a>`;
        } else {
          userSection.innerHTML=`<a href='/backend/login.php' class='px-3 py-1 bg-indigo-600 text-white rounded hover:bg-indigo-500'>登录 / 注册</a>`;
        }
      } catch(e){
        console.error('登录状态获取失败',e);
        userSection.innerHTML=`<a href='/backend/login.php' class='px-3 py-1 bg-indigo-600 text-white rounded hover:bg-indigo-500'>登录 / 注册</a>`;
      }
    }
    renderUserSection();
  </script>
</body>
</html>
