<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自动混音 - Starwaves Music</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
  <nav class="bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center space-x-4">
        <a href="index.html" class="text-xl font-bold text-indigo-600">Starwaves Music</a>
        <a href="star-ai.html" class="text-gray-700 hover:text-indigo-600">STAR.AI</a>
        <a href="mix.html" class="text-indigo-600 font-semibold">混音</a>
        
        <a href="top.html" class="text-gray-700 hover:text-indigo-600">STAR TOP榜</a>
      </div>
      <div id="user-section" class="flex items-center space-x-2"></div>
    </div>
  </nav>

  <section class="max-w-4xl mx-auto py-12">
    <h1 class="text-3xl font-bold mb-6">自动混音</h1>
    <p class="mb-4">上传你的多轨项目文件，系统将自动进行混音处理（后续接入实际混音服务）。</p>
    <form class="bg-white p-6 rounded shadow space-y-4">
      <label class="block">
        <span class="text-gray-700">上传音轨压缩包（zip）</span>
        <input type="file" accept=".zip" class="mt-1 block w-full" required />
      </label>
      <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-500">开始混音</button>
    </form>
    <div class="mt-6 text-sm text-gray-600">（功能待实现）</div>
  </section>

  <footer class="bg-gray-800 text-gray-200 py-4 mt-12">
    <div class="max-w-7xl mx-auto text-center">© 2026 Starwaves Music</div>
  </footer>

  <script>
    const userSection=document.getElementById('user-section');
    function render(){
      const u=localStorage.getItem('user');
      if(u){userSection.innerHTML=`<span class='mr-2'>欢迎, ${u}</span><button id='logout' class='px-2 py-1 bg-gray-600 rounded hover:bg-gray-500'>退出</button>`;document.getElementById('logout').onclick=()=>{localStorage.removeItem('user');location.reload();}}else{userSection.innerHTML=`<button id='login' class='px-3 py-1 bg-indigo-600 text-white rounded hover:bg-indigo-500'>登录 / 注册</button>`;document.getElementById('login').onclick=()=>{const n=prompt('昵称');if(n){localStorage.setItem('user',n);location.reload();}}}
    render();
  </script>
</body>
</html>
